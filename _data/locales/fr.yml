about:
  title: "Qui sommes-nous ?"
  body: "Vatra est né de la rencontre entre des Français et des Ukrainiens du Grand Nancy et de Meurthe-et-Moselle, autour d'une idée simple : créer un lieu chaleureux qui rassemble et qui donne du travail. Le projet est porté en lien avec les associations Ukraine Lorraine et Les Lumières d'Ukraine, déjà actives auprès de la communauté ukrainienne du territoire. Rien n'est figé : nous construisons ce lieu avec vous."
  cta: "Je participe"
  photo_alt: "La communauté ukrainienne de Lorraine réunie pour la Journée du drapeau de l'Ukraine à Nancy, en 2025."

hero:
  title: "Participez à l'émergence d'un lieu franco-ukrainien à <mark class=\"hi\">Nancy</mark>"
  subtitle: "Un café-pâtisserie qui rassemble — et qui donne du travail. À construire ensemble."
  tagline: "Français et Ukrainiens du Grand Nancy et de Meurthe-et-Moselle, nous portons un projet de <mark class=\"hi\">café-pâtisserie</mark> et de <mark class=\"hi\">lieu de rencontres</mark>, et nous avons besoin de votre soutien ! 💙💛"
  btn_participate: "Je participe"
  btn_detail: "Le projet en détail"
  community_photo_alt: "Membres de la communauté ukrainienne de Lorraine réunis pour la Journée du drapeau de l'Ukraine à Nancy, 2025."

project:
  anchor_label: "Le projet"
  title: "Le projet, en quelques mots"
  teaser: |
    Un café-pâtisserie ukrainien à Nancy : on y mange, on s'y retrouve, on fête, on apprend le français et l'ukrainien. Mais c'est surtout un lieu qui **emploie et forme** des personnes de la communauté pour les aider à retrouver un travail. La cuisine fait vivre le lieu ; donner du travail en est le cœur.
  detail_cta: "Le projet en détail →"
  detail_path: "/projet/"

how:
  anchor_label: "Comment ça marche"
  title: "Un restaurant sans patron"
  body: |
    En France, on peut ouvrir un lieu dont le but n'est pas d'enrichir un propriétaire, mais de faire vivre les gens : c'est l'**économie sociale et solidaire**. L'argent gagné sert à payer les salaires, à former et à faire tourner le lieu.

    Pour vivre, il s'appuie sur trois sources : **ce qu'on vend** (cafés, pâtisseries), **l'aide de l'État** pour l'emploi et la formation, et **le soutien** de la ville, de fondations et de chacun.

examples:
  anchor_label: "Exemples"
  title: "Des lieux comme ça existent déjà"
  items:
    - "**Refugee Food** (France) — forme et emploie des personnes réfugiées dans des restaurants ouverts à tous."
    - "**La Cantine de Marioupol / Stand with Ukraine** — des Ukrainiens formés à la cuisine, autour d'un lieu de rencontre."
    - "**La Conciergerie de Quartier** (Nantes) — un café-restaurant qui est aussi un lieu de vie de quartier."

status:
  anchor_label: "Où on en est"
  title: "Où on en est"
  body: "Le projet en est au tout début : on rassemble les avis, on rencontre les partenaires (associations ukrainiennes, acteurs de l'économie sociale) et on cherche un lieu. Rien n'est figé : votre avis peut encore tout changer."

