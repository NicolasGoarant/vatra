support_aside:
  title: "Vous pouvez aussi soutenir le projet"
  body: "Participer, c'est d'abord être là : nous dire que vous êtes intéressé, donner un peu de temps, une idée, un contact. Et si vous le souhaitez, vous pouvez aussi soutenir le projet financièrement — par un don, ou demain en prenant des parts de la coopérative."
  link_label: "→ Comment soutenir le projet"
  link_url: "/projet/#soutenir"

