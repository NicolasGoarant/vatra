about:
  title: "Хто ми?"
  body: "Vatra народилася із зустрічі французів та українців Великого Нансі та департаменту Мерт-і-Мозель навколо простої ідеї: створити тепле місце, яке об'єднує і дає роботу. Проєкт реалізується у співпраці з асоціаціями Ukraine Lorraine та Les Lumières d'Ukraine, які вже працюють з українською громадою регіону. Нічого не вирішено: ми створюємо це місце разом з вами."
  cta: "Долучитися"
  photo_alt: "Українська громада Лотарингії на святкуванні Дня прапора України в Нансі, 2025."

hero:
  title: "Долучіться до створення франко-українського місця в <mark class=\"hi\">Нансі</mark>"
  subtitle: "Кафе-кондитерська, що об'єднує — і дає роботу. Створюємо разом."
  tagline: "Французи й українці Гран-Нансі та департаменту Мерт-і-Мозель, ми створюємо проєкт <mark class=\"hi\">кафе-кондитерської</mark> та <mark class=\"hi\">місця зустрічей</mark>, і нам потрібна ваша підтримка! 💙💛"
  btn_participate: "Долучитися"
  btn_detail: "Проєкт детально"
  community_photo_alt: "Українська громада Лотарингії на святкуванні Дня прапора України в Нансі, 2025."

project:
  anchor_label: "Проєкт"
  title: "Проєкт, коротко"
  teaser: |
    Українське кафе-кондитерська в Нансі: тут їдять, зустрічаються, святкують, вчать французьку та українську. Але передусім це місце, яке **наймає й навчає** людей з громади, щоб допомогти їм знайти роботу. Кухня дає життя місцю; дати роботу — його серце.
  detail_cta: "Проєкт детально →"
  detail_path: "/uk/proekt/"

how:
  anchor_label: "Як це працює"
  title: "Ресторан без господаря"
  body: |
    У Франції можна відкрити заклад, мета якого — не збагатити власника, а щоб люди жили краще: це **соціальна та солідарна економіка**. Зароблені гроші йдуть на зарплати, навчання й роботу закладу.

    Щоб існувати, він спирається на три джерела: **те, що продаємо** (кава, тістечка), **допомога держави** для працевлаштування й навчання, і **підтримка** міста, фондів та кожного.

examples:
  anchor_label: "Приклади"
  title: "Подібні місця вже існують"
  items:
    - "**Refugee Food** (Франція) — навчає та працевлаштовує біженців у ресторанах, відкритих для всіх."
    - "**«La Cantine de Marioupol» / Stand with Ukraine** — українці, навчені кулінарної справи, навколо місця зустрічі."
    - "**La Conciergerie de Quartier** (Нант) — кафе-ресторан, що є водночас місцем життя кварталу."

status:
  anchor_label: "Де ми зараз"
  title: "Де ми зараз"
  body: "Проєкт на самому початку: ми збираємо думки, зустрічаємося з партнерами (українські асоціації, учасники соціальної економіки) і шукаємо приміщення. Нічого не вирішено: ваша думка ще може все змінити."

participate:
  anchor_label: "Долучитися"
  title: "Долучитися"
  intro: "Це місце створюватиметься разом з вами. Скажіть, чи близька вам ця ідея — це займе хвилину. 🌻"
  path: "/uk/doluchytysia/"
  back_link: "← Повернутися на головну"

support_aside:
  title: "Ви також можете підтримати проєкт"
  body: "Долучитися — це передусім бути поруч: сказати нам, що вам цікаво, дати трохи часу, ідею, контакт. А якщо забажаєте, ви можете підтримати проєкт і фінансово — пожертвою, а згодом — купівлею часток кооперативу."
  link_label: "→ Як підтримати проєкт"
  link_url: "/uk/proekt/#soutenir"

